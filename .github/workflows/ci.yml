name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Database schema
        run: npm run db:push

      - name: Seed demo users
        run: npm run db:seed

      - name: Unit tests
        run: npm run test

      - name: Build all workspaces
        run: npm run build
